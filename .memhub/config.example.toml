# Canonical memhub config for this repo. Tracked in git.
#
# A fresh `memhub init` (or any `open_project` call on a machine with no
# `.memhub/config.toml`) copies this file verbatim into the local
# `.memhub/config.toml`, which is gitignored. Edit this file to change
# the baseline for every machine; edit `.memhub/config.toml` to make a
# per-machine override that doesn't sync via git.
#
# Fields that should NOT drift across machines (commit changes here):
#   - deny_list.patterns               (security boundary)
#   - retrieval.mode                   (recall behavior)
#   - retrieval.fact_stale_after_days  (recall behavior)
#   - retrieval.use_reranker           (recall behavior)
#   - retrieval.rerank_candidate_pool  (recall behavior)
#   - retrieval.scoring.*              (reproducible recall)
#   - code_index.*                     (reproducible locate ranking; split
#                                       from retrieval.scoring.* in R11 /
#                                       issue #73 — locate and recall no
#                                       longer share weights)
#   - integrations.k9.*                (project property)
#   - render.output_dir                (project property)
#   - metrics.enabled = false          (off by default; changes here set
#                                       the canonical install default)
#   - gc.prune_superseded_incremental  (Wave 5 U5a; off by default —
#                                       changes here set the canonical
#                                       install default)
#   - gc.prune_large_thirdparty        (Wave 5 U5b; off by default —
#                                       changes here set the canonical
#                                       install default)
#   - gc.delete_stale_backups          (Wave 5 U8; off = report-only,
#                                       gc's long-standing default
#                                       posture — changes here set the
#                                       canonical install default)
#   - doc.allowed_dirs                 (MCP doc_add path-confinement
#                                       allowlist; security boundary,
#                                       canonical baseline is EMPTY. An
#                                       operator widening it for their own
#                                       machine's external spec dirs sets
#                                       it in the local config.toml, not
#                                       committed back here as a real path)
#   - wrap_up.transcript_retention_days (Wave 6 W3, issue #96; retention
#                                       horizon in days for archived
#                                       session transcripts. A repo-wide
#                                       policy value even though the
#                                       `transcript` verbosity that uses
#                                       it is a per-machine opt-in; 0 =
#                                       keep forever. Doctor baseline-
#                                       checks this one, unlike
#                                       wrap_up.verbosity below.)
#
# Fields that are per-machine preferences (override locally without
# committing back to the example):
#   - auto_sync_md
#   - log_level
#   - retrieval.default_max_results
#   - retrieval.accepted_only_by_default
#   - retrieval.include_stale_by_default
#   - retrieval.include_docs_in_default  (canonical baseline false
#                                         here; auto-flips to true in
#                                         the local config on first
#                                         `doc add` — do NOT commit a
#                                         true value back)
#   - metrics.*                        (opt-in token accounting; each
#                                       install opts in independently
#                                       and the transcript paths are
#                                       auto-resolved per machine)
#   - global.enabled = false           (opt-in machine-global memory;
#                                       each repo opts in independently
#                                       via `memhub global enable`)
#   - global.include_docs_in_default   (baseline false here; auto-flips
#                                       to true in the local config on
#                                       first `doc add --global` — do
#                                       NOT commit a true value back)
#   - sync.enabled = false             (opt-in cross-machine Drive sync;
#                                       each repo opts in per machine via
#                                       `memhub sync enable`)
#   - sync.project_id / sync.drive_subpath (per-repo; project_id is
#                                       normally derived from the git
#                                       remote and left empty)
#   - audit.user_md_path                (opt-in `memhub audit md` check
#                                       of a user-global orientation
#                                       file; empty/unset by default —
#                                       do NOT commit a real path back)
#   - wrap_up.verbosity                 (repo policy; canonical baseline
#                                       "standard" here (Wave 6 W1,
#                                       decision Q7). A machine may
#                                       locally raise this to
#                                       "transcript" to opt into
#                                       session-transcript archiving
#                                       (issue #96) — that is a
#                                       sanctioned per-machine opt-in,
#                                       not drift (doctor does not
#                                       baseline-check this field), so
#                                       do NOT commit "transcript" back
#                                       as the baseline default here)

project_name = "memhub"
auto_sync_md = false
log_level = "info"

[deny_list]
patterns = [
    ".env",
    ".env.*",
    "*.pem",
    "*.key",
    "*.p12",
    "*.pfx",
    "id_rsa",
    "id_rsa.*",
    "id_dsa",
    "id_dsa.*",
    "id_ecdsa",
    "id_ecdsa.*",
    "id_ed25519",
    "id_ed25519.*",
    "secrets/**",
    ".aws/credentials",
    ".gcloud/credentials*",
    ".gnupg/**",
]

[integrations.k9]
enabled = false
agent_docs_path = "agent_docs"

[render]
output_dir = ".memhub/rendered"

[retrieval]
mode = "hybrid"
default_max_results = 6
accepted_only_by_default = false
# Un-silence staleness (Q1 / decision 145): keep facts past
# fact_stale_after_days in recall but DEMOTE them (scoring.stale_penalty)
# and flag them stale:true, instead of silently excluding them. This is
# the no-loss default — a bad default hides valid memories, demote is the
# reversible posture. Set to false to restore hard exclusion.
include_stale_by_default = true
# Fact-staleness horizon in days: a fact never verified, or last verified
# more than this many days ago, is treated as stale (and demoted per the
# flag above). Promotes the formerly hardcoded 90-day window to config
# without changing its length.
fact_stale_after_days = 90
# Cross-encoder re-ranker (ms-marco-MiniLM-L-6-v2). Adds ~275 ms per
# recall at pool=20; lifted Recall@1 by ~17pp on memhub's golden set in
# the bake-off (decision 68). Ignored in fts mode.
use_reranker = true
rerank_candidate_pool = 20
# Make ingested doc chunks eligible for the *default* recall bundle
# (no --source-type needed), gated by scoring.doc_min_rerank_score.
# Canonical baseline is false (decision 86: docs are opt-in). The
# first successful `memhub doc add` in a repo flips the LOCAL
# config.toml to true so the user-pointed write that establishes
# docs also wires up retrieval — that per-repo drift is expected and
# is not committed back here. Explicit `--source-type doc` recall is
# unaffected by this flag either way.
include_docs_in_default = false

[retrieval.scoring]
fts_weight = 0.5
vector_weight = 0.5
# FACTS ONLY: demotion for a fact past fact_stale_after_days (see
# include_stale_by_default above). Decisions, tasks, and doc chunks are
# never marked stale and never pay this penalty; the code index
# ([code_index], below) has no staleness concept at all.
stale_penalty = 0.3
# Blended-score demotion for a SUPERSEDED fact/decision (Wave 3 L3,
# decision 145's demote-with-link ruling). A superseded row is never
# excluded — it stays, is tagged superseded_by:N, and is pushed down.
# Set above stale_penalty (0.3): supersession is an explicit "replaced"
# signal, stronger than mere age, yet still a demotion, not a filter.
# Stacks additively with stale_penalty.
superseded_penalty = 0.4
# Optional continuous age decay (Wave 3 L6). 0 = OFF (default): scoring is
# byte-identical to pre-L6 memhub, no decay applied. When > 0, a candidate's
# blended relevance is multiplied by an exponential half-life decay —
# halving every age_half_life_days — keyed on verified_at for facts and
# updated_at for DONE tasks. Decisions and doc chunks are excluded entirely
# (Q2 / decision 145: decisions retire by supersession, not age), as are
# open/blocked tasks and never-verified facts. Under the cross-encoder
# reranker the practical effect is limited: decay mostly shifts which
# candidates enter the rerank pool, not the final reranked order. Kept at 0
# in this baseline so the canonical install stays byte-identical.
age_half_life_days = 0
# Cross-encoder relevance floor (replaces the legacy min_vector_score
# cosine floor — see decisions 70, 71). Calibrated empirically against
# memhub's golden set: gibberish probe scores ~+1.25, next legitimate
# match drops out at +2.5; 2.0 sits in the middle of the safe band.
# Only applied when re-ranker runs (hybrid + use_reranker).
min_rerank_score = 2.0
# Floor for doc chunks that entered via include_docs_in_default.
# Calibrated empirically (recall.rs
# doc_default_recall_floor_routes_by_task_relevance): an on-topic doc
# chunk reranks ~+1.6, off-topic ~−11, so 0.0 (the MiniLM
# relevant/irrelevant sign boundary) routes by task with wide margin.
# Deliberately *below* min_rerank_score — doc chunks rerank in a
# lower band than facts/decisions, so a higher floor would wrongly
# filter relevant docs. Ignored for explicit --source-type doc.
doc_min_rerank_score = 0.0

# Code locator (memhub locate) scoring, over the separate sibling DB
# .memhub/code_index.sqlite — split from retrieval.scoring.fts_weight /
# vector_weight above (R11, issue #73). Locate and recall are different
# indices over different content (code chunks vs.
# facts/decisions/tasks/docs) that used to share those two weights, so
# tuning one silently retuned the other. Defaults reproduce the pre-split
# shared values (0.5/0.5) and the formerly hardcoded TEST_PATH_PENALTY
# const (0.90, task 85) byte-for-byte. No stale/superseded/age-decay/
# min-rerank-score knob here — a code chunk is either indexed or it
# isn't, never decayed, and locate's optional --rerank has no score floor.
[code_index]
fts_weight = 0.5
vector_weight = 0.5
# Multiplicative down-weight for chunks under top-level tests/, benches/,
# or examples/ directories so they don't out-rank implementation files.
test_path_penalty = 0.90

# Token accounting (decision 74). Off by default; opt in per machine
# via `memhub metrics enable`. recall_proxy is component A (cheap,
# local arithmetic, cannot break across Claude Code updates).
# session_accounting is component B (transcript JSONL scraping) and
# is kept behind its own kill switch in case the transcript shape
# shifts. claude_transcripts_dir is auto-resolved on first enable and
# written back to .memhub/config.toml so it is visible and
# overridable; codex_transcripts_dir is a stub until that format is
# confirmed. Tokenizer estimate (tiktoken cl100k) is acknowledged as
# +/-10% off Anthropic's real tokenizer; symmetric across both sides
# of the comparison so the ratio stays sound. Retention: closed
# session_metrics and old recall_metrics rows past retention_days are
# pruned opportunistically (no daemon). calibration_factor (task 63)
# corrects the cl100k bias: 1.0 is an uncalibrated passthrough; run
# `memhub metrics calibrate` to measure the real cl100k->Anthropic ratio
# (the only command that uses the network) and write it back. It is
# PER-MACHINE — a property of the local binary's tokenizer, not the repo
# — so do NOT commit a non-default value back into this example.
[metrics]
enabled = false
recall_proxy = true
session_accounting = true
claude_transcripts_dir = ''
codex_transcripts_dir = ''
tokenizer = 'tiktoken-cl100k'
retention_days = 90
calibration_factor = 1.0

# Machine-global memory (M9). Off by default and per-repo: a repo
# opts in via `memhub global enable`, which also creates the shared
# store at ~/.memhub/global.sqlite on first enable anywhere on the
# machine. When enabled, recall in this repo merges hits from the
# global store (tagged scope: "global"), and `--global` writes /
# accepted global proposals are permitted. Disabled or store-absent
# → recall is byte-identical to a pre-M9 build. The global store is
# machine-wide and per-machine (never exported, never synced);
# `enabled` is the per-repo consumption + write gate.
# include_docs_in_default mirrors retrieval.include_docs_in_default
# for the global corpus: canonical baseline false here, auto-flips to
# true in the LOCAL config.toml on the first `doc add --global` — do
# NOT commit a true value back.
[global]
enabled = false
include_docs_in_default = false

# Cross-machine Drive sync (M10). Off by default and per-repo; opt in
# via `memhub sync enable`. memhub itself stays OFFLINE — the `sync`
# commands (snapshot/check/adopt/commit) operate on local files only.
# The transport is an OS-level synced folder: Google Drive for Desktop
# on macOS/Windows, or an rclone mount on Linux. The project id is
# normally derived from the git remote URL, so leave project_id empty;
# set it only for a repo with no git remote. drive_subpath is the
# local path of the synced Drive folder ON THIS MACHINE (e.g.
# ~/Library/CloudStorage/GoogleDrive-<you>/My Drive/memhub-sync on
# macOS, G:\My Drive\memhub-sync on Windows, or your rclone mount on
# Linux such as ~/gdrive/memhub-sync) — the snapshot is written
# to/read from <drive_subpath>/memhub/<project_id>/. A leading ~ (or
# ~/) expands to the home directory; any other path is used verbatim,
# so an absolute path also works everywhere. Both `enabled` and
# `drive_subpath` are PER-MACHINE: keep them out of this committed
# baseline and set them in the local config.toml.
[sync]
enabled = false
project_id = ""
drive_subpath = ""

# MCP-only path confinement for the agent-facing `doc_add` tool (Wave-0
# F11, decision Q39). The MCP handler canonicalizes the agent-supplied
# path and accepts it only when it resolves under the repo root or one
# of these allowed_dirs entries, with the deny_list patterns above still
# applied on top — a deny-listed path inside the repo root still
# refuses. The CLI `memhub doc add` command is user-typed and stays
# unrestricted; this list has no effect on it. Canonical baseline is
# empty (pure repo-root confinement). If you legitimately point doc_add
# at an external spec directory on this machine, add it to the LOCAL
# config.toml rather than committing a real path back here.
[doc]
allowed_dirs = []

# Opt-in `memhub audit md` (Wave 2 C5, issue #32, decision Q25): when set,
# also size-checks this user-global orientation file (e.g.
# ~/.claude/CLAUDE.md) against the same ~2,500-token target/2,600 hard
# ceiling used for this repo's own CLAUDE.md. Empty (unset) by default —
# `memhub audit md` never reads outside the repo unless you set this
# yourself. Per-machine: do NOT commit a real path back into this example.
[audit]
user_md_path = ""

# Wave 5 gc hardening (July 2026 improvement review, U5/U8 — decision
# Q12/Q16). All three are off/report-only by default so `memhub gc`
# stays byte-identical to pre-Wave-5 behavior for these classes unless
# explicitly opted in. There is no CLI flag for any of these; they are
# deliberate, persisted per-repo policy, not one-off switches.
# prune_superseded_incremental (U5a): also prune superseded
# target/<profile>/incremental/memhub-* session dirs — excluded by a
# shipped decision whose "no comparable disk win" rationale no longer
# holds, but reversing it stays an explicit opt-in. prune_large_thirdparty
# (U5b): also prune large (>=100 MB/hash) multi-hash third-party deps/
# artifacts (e.g. ort_sys) — narrowly opt-in and size-gated, not a
# blanket "third-party is fair game" flip. delete_stale_backups (U8):
# actually delete .memhub/backups/{rendered,markdown} files beyond the
# newest 20 (report-only otherwise); never applies to the legacy
# project.sqlite.k9-bootstrap-backup, which is only ever reported, or
# to backups/sync/, which is already single-slot.
[gc]
prune_superseded_incremental = false
prune_large_thirdparty = false
delete_stale_backups = false

# Wrap-up policy verbosity (Wave 6 W1, issue #95 / decision Q7). Governs
# how much `/wrap-up` drafts and writes: minimal (state + task closures
# only — the turn-1 continuity floor), standard (today's full flow,
# unchanged — see templates/skills/claude/wrap-up.md,
# templates/skills/codex/wrap-up/SKILL.md, and
# templates/skills/opencode/wrap-up/), full (standard with the decision
# --summary field promoted from optional to mandatory whenever a
# decision is drafted — decision 72's paraphrase; facts have no
# --summary field to promote — plus the architecture-drift check and
# pending-write triage promoted from conditional to always-run, and a
# richer session note), or transcript (full + a named transcript-
# archive step; the archiver itself is issue #96 / W3). Run `memhub
# wrapup-policy` to render the full instruction text for the resolved
# level. Canonical baseline is "standard" — a machine may raise this
# locally (most notably to "transcript") without that being drift; see
# the per-machine-preferences note above. Do NOT commit "transcript"
# back as the baseline default here.
#
# transcript_retention_days (Wave 6 W3, issue #96): retention horizon in
# days for the transcript-level archiver. Once a machine opts into
# verbosity = "transcript", `/wrap-up` copies the raw session JSONL into
# .memhub/transcripts/<date>-<session-id>.jsonl.zst; the archiver prunes
# those files AND their pointer rows once they are older than this many
# days. 0 disables pruning (keep forever). Unlike verbosity, this is a
# repo-wide policy baseline (doctor drift-checks it), so commit horizon
# changes here. Default 90, matching metrics.retention_days.
[wrap_up]
verbosity = "standard"
transcript_retention_days = 90
