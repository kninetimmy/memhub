[package]
name = "memhub"
version = "0.1.0"
edition = "2024"
description = "Local-first project memory for Codex and Claude Code."
license = "MIT"
repository = "https://github.com/kninetimmy/memhub"

[dependencies]
clap = { version = "4.5.38", features = ["derive"] }
env_logger = "0.11.8"
log = "0.4.28"
rmcp = { version = "1.5.0", features = ["server", "macros", "schemars", "transport-io"] }
rusqlite = { version = "0.32.1", features = ["bundled"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["io-std", "rt-multi-thread"] }
toml = "0.8.23"

[dev-dependencies]
tempfile = "3.20.0"
