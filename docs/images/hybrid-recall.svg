<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" width="840" height="380" style="max-width:100%;display:block;">
  <defs>
    <marker id="ah-down" markerWidth="7" markerHeight="7" refX="3.5" refY="6" orient="auto">
      <polygon points="0 0, 7 0, 3.5 7" fill="#4a5470"/>
    </marker>
    <marker id="ah-down-cyan" markerWidth="7" markerHeight="7" refX="3.5" refY="6" orient="auto">
      <polygon points="0 0, 7 0, 3.5 7" fill="#19e3ff"/>
    </marker>
    <marker id="ah-down-violet" markerWidth="7" markerHeight="7" refX="3.5" refY="6" orient="auto">
      <polygon points="0 0, 7 0, 3.5 7" fill="#a45cff"/>
    </marker>
    <marker id="ah-down-orange" markerWidth="7" markerHeight="7" refX="3.5" refY="6" orient="auto">
      <polygon points="0 0, 7 0, 3.5 7" fill="#ff8a1f"/>
    </marker>
    <marker id="ah-down-green" markerWidth="7" markerHeight="7" refX="3.5" refY="6" orient="auto">
      <polygon points="0 0, 7 0, 3.5 7" fill="#1fe88a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="840" height="380" rx="14" fill="#0c0e18"/>
  <rect width="840" height="380" rx="14" fill="none" stroke="#1e2435" stroke-width="1"/>

  <!-- ─── Top: Query input ─────────────────────────────── -->
  <rect x="280" y="20" width="280" height="48" rx="10" fill="#111521" stroke="#e2e8f4" stroke-width="1" opacity="0.6"/>
  <text x="420" y="40" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5a6480" letter-spacing="0.8">YOUR QUERY</text>
  <text x="420" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#e2e8f4">"why did we pick rusqlite?"</text>

  <!-- Split arrow down from query -->
  <line x1="420" y1="68" x2="420" y2="90" stroke="#4a5470" stroke-width="1.5"/>
  <line x1="240" y1="90" x2="600" y2="90" stroke="#4a5470" stroke-width="1.5"/>
  <!-- left branch down -->
  <line x1="240" y1="90" x2="240" y2="116" stroke="#19e3ff" stroke-width="1.5" marker-end="url(#ah-down-cyan)"/>
  <!-- right branch down -->
  <line x1="600" y1="90" x2="600" y2="116" stroke="#a45cff" stroke-width="1.5" marker-end="url(#ah-down-violet)"/>

  <!-- ─── Left path: FTS5 ──────────────────────────────── -->
  <rect x="80" y="118" width="320" height="64" rx="10" fill="#0a1428" stroke="#19e3ff" stroke-width="1"/>
  <text x="240" y="143" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#19e3ff">FTS5 (BM25)</text>
  <text x="240" y="163" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5a6480">keyword + stemmed variant search</text>

  <!-- ─── Right path: Embeddings ───────────────────────── -->
  <rect x="440" y="118" width="320" height="64" rx="10" fill="#140e28" stroke="#a45cff" stroke-width="1"/>
  <text x="600" y="143" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#a45cff">BGE-small embeddings</text>
  <text x="600" y="163" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5a6480">semantic similarity · cosine distance</text>

  <!-- Arrows down from both paths -->
  <line x1="240" y1="182" x2="240" y2="205" stroke="#19e3ff" stroke-width="1.5" marker-end="url(#ah-down-cyan)"/>
  <line x1="600" y1="182" x2="600" y2="205" stroke="#a45cff" stroke-width="1.5" marker-end="url(#ah-down-violet)"/>

  <!-- Score labels -->
  <text x="240" y="200" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#19e3ff">BM25 score</text>
  <text x="600" y="200" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#a45cff">cosine score</text>

  <!-- Merge lines toward blender -->
  <line x1="240" y1="210" x2="240" y2="230" stroke="#4a5470" stroke-width="1.5"/>
  <line x1="600" y1="210" x2="600" y2="230" stroke="#4a5470" stroke-width="1.5"/>
  <line x1="240" y1="230" x2="600" y2="230" stroke="#4a5470" stroke-width="1.5"/>
  <line x1="420" y1="230" x2="420" y2="252" stroke="#ff8a1f" stroke-width="1.5" marker-end="url(#ah-down-orange)"/>

  <!-- ─── Score Blender ──────────────────────────────────── -->
  <rect x="220" y="254" width="400" height="56" rx="10" fill="#201208" stroke="#ff8a1f" stroke-width="1"/>
  <text x="420" y="278" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#ff8a1f">score blender</text>
  <text x="420" y="298" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#5a6480">0.5 × FTS  +  0.5 × vec  −  0.3 × stale_penalty</text>

  <!-- Arrow down to re-ranker -->
  <line x1="420" y1="310" x2="420" y2="332" stroke="#1fe88a" stroke-width="1.5" marker-end="url(#ah-down-green)"/>

  <!-- ─── Re-ranker ──────────────────────────────────────── -->
  <rect x="220" y="334" width="400" height="26" rx="8" fill="#081a12" stroke="#1fe88a" stroke-width="1" opacity="0.8"/>
  <text x="420" y="352" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#1fe88a">cross-encoder re-ranker  ·  ms-marco-MiniLM-L-6-v2</text>

  <!-- Small "bundled in binary" note -->
  <text x="680" y="352" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9.5" fill="#3a4560">bundled · offline</text>
</svg>
